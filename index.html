<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport + Safe Areas para notch/punch-hole -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- SEO & Description -->
    <meta name="description" content="Conversio AI — Cria anúncios profissionais com IA em segundos. UGC, vídeos, imagens e muito mais." />
    <title>Conversio AI</title>

    <!-- Theme Color -->
    <meta name="theme-color" content="#050508" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050508" />

    <!-- iOS Safari — Comportamento de App Nativa -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Conversio AI" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA Manifest (gerado pelo VitePWA) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple Touch Icons (Safari não usa manifest para ícones) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128x128.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
