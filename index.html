<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SNCEHJL2E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-7SNCEHJL2E');
    </script>


    <!-- Viewport + Safe Areas para notch/punch-hole -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="Conversio AI — Anúncios em Segundos. Cria anúncios profissionais com IA." />
    <title>Conversio</title>

    <!-- PWA Essencial -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Conversio" />

    <!-- iOS Obrigatório -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Conversio" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Previne comportamentos de browser -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon_oficial.png" />
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[PWA] Service Worker registado com sucesso:', reg.scope))
            .catch(err => console.error('[PWA] Falha no registo do Service Worker:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
