<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport + Safe Areas para notch/punch-hole -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="Conversio AI — Anúncios em Segundos. Cria anúncios profissionais com IA." />
    <title>Conversio</title>

    <!-- PWA Essencial -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Conversio" />

    <!-- iOS Obrigatório -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Conversio" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Previne comportamentos de browser -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon_oficial.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
